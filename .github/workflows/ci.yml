name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Prisma reads these from the schema datasource block. Generate/typecheck/build
  # do not connect; a placeholder value is sufficient. Integration tests (added
  # from Phase 3) spin up their own Postgres/Redis via Testcontainers.
  DATABASE_URL: postgresql://aureus:aureus@localhost:5432/aureus
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci-access-secret-placeholder-value
  JWT_REFRESH_SECRET: ci-refresh-secret-placeholder-value

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
