name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://aureus:aureus@localhost:5432/aureus
  TEST_DATABASE_URL: postgresql://aureus:aureus@localhost:5432/aureus
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci-access-secret-placeholder-value
  JWT_REFRESH_SECRET: ci-refresh-secret-placeholder-value

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aureus
          POSTGRES_PASSWORD: aureus
          POSTGRES_DB: aureus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aureus -d aureus"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm --filter @aureus/db exec prisma migrate deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
