services:
  postgres:
    image: postgres:16-alpine
    container_name: aureus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aureus
      POSTGRES_PASSWORD: aureus
      POSTGRES_DB: aureus
    ports:
      - "5432:5432"
    volumes:
      - aureus-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aureus -d aureus"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: aureus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - aureus-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aureus-pgdata:
  aureus-redisdata:
