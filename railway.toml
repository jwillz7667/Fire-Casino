# Railway config-as-code for the Goldwave Casino API — WEB service.
# The worker service points its "Config file" setting at railway.worker.toml.
# Postgres + Redis are separate Railway services; DATABASE_URL / REDIS_URL are
# set as reference variables (see README → Deployment).

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
# Only redeploy the API when something it actually ships changes. Without this,
# Railway's default watch behaviour skipped backend-relevant commits (notably DB
# migrations under packages/db) whenever they shared a push with frontend-only
# commits, so `prisma migrate deploy` never ran. Crucially this list includes the
# Railway config files themselves, so a change to watchPatterns bootstraps its own
# deploy. Frontend apps (apps/arcade, apps/console) deploy on Vercel, not here.
watchPatterns = [
  "apps/api/**",
  "packages/**",
  "Dockerfile",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "railway.toml",
  "railway.worker.toml",
]

[deploy]
startCommand = "node apps/api/dist/main.js"
# Apply pending migrations once, in the built image, before the new version
# starts. Only the web service runs this so two services don't race the DB.
preDeployCommand = "pnpm --filter @aureus/db exec prisma migrate deploy"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
